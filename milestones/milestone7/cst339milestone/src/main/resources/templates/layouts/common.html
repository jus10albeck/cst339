<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div th:fragment="header">
		<div class="bs-example">
			<nav class="navbar navbar-default" >
				<!-- Brand and toggle get grouped for better mobile display -->
				<div class="navbar-header">
					<button type="button" data-target="#navbarCollapse" data-toggle="collapse" class="navbar-toggle">
						<span class="sr-only">Toggle navigation</span>
						<span class="icon-bar"></span>
					</button>
				</div>
				<!-- Collection of nav links and other content for toggling -->
				<div id="navbarCollapse" class="collapse navbar-collapse " 
                style="background-color: #1D3461; box-shadow: 0 2px 4px rgba(0,0,0,.4);
                 font-family: 'Eagle Lake', cursive;">
					<ul class="nav navbar-nav">
						<li><a href="/home/" class="nav-hover" style="font-size: x-large;">Physical Library</a></li>
					</ul>
                    <ul class="nav navbar-nav navbar-center" style="position: absolute; left: 50%; transform: translateX(-50%);">
                        <li><a th:href="@{/collections/}" class="nav-hover" style="font-size: large;">Collections</a></li>
                        <li><a th:href="@{/home/}" class="nav-hover" style="font-size: large;">Watch List</a></li> <!-- Placeholder link -->
                        <li><a th:href="@{/home/}" class="nav-hover" style="font-size: large;">Wishlist</a></li> <!-- Placeholder link -->
                    </ul>

					<ul class="nav navbar-nav navbar-right">
					<!-- If not signed in, show Login/Register links -->
						<li th:if="${currentUsername == null}">
							<a th:href="@{/login/}" class="nav-hover">Login</a>
						</li>
						<li th:if="${currentUsername == null}">
							<a th:href="@{/registration/}" class="nav-hover">Register</a>
						</li>

					<!-- If signed in, show Hello <username> with dropdown -->
						<li th:if="${currentUsername != null}" class="dropdown">

							<a href="#" class="dropdown-toggle nav-hover" data-toggle="dropdown"
								role="button" aria-haspopup="true" aria-expanded="false">
								<span th:text="${'Hello ' + currentUsername}">Hello user</span>
								<span class="caret"></span>
							</a>

							<ul class="dropdown-menu dropdown-menu-right">
								<li>
									<!-- Spring Security logout is POST to /logout and requires CSRF -->
									<form th:action="@{/logout}" method="post" style="margin:0; padding: 8px 16px;">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
									<button type="submit" class="btn btn-link" style="padding:0;">Logout</button>
									</form>
								</li>
							</ul>
						</li>
					</ul>
				</div>
			</nav>
		</div>
	</div>
</body>
</html>
