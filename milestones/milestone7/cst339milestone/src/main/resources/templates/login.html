<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/defaultTemplate}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <div layout:fragment="content">
        <h1>Login</h1>

        <!-- Feedback from Spring Security -->
        <div th:if="${param.error}" style="color:red">Invalid username or password.</div>
        <div th:if="${param.logout}" style="color:green">You have been logged out.</div>

        <form th:action="@{/login/doLogin}" method="post">
            <!-- CSRF token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <table style="font-family: Merriweather, serif; font-size: 16px;">
                <tr>
                    <td style="padding-right: 10px;">Username:</td>
                    <td style="padding-bottom: 5px">
                        <input type="text" name="username" required />
                    </td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td style="padding-bottom: 5px">
                        <input type="password" name="password" required />
                    </td>
                </tr>
                <tr>
                    <td colspan="3" style="text-align: center;">
                        <input type="submit" value="Submit" />
                    </td>
                </tr>
            </table>
        </form>

        <p>Don't have an account?<br/>
            <a th:href="@{/registration/}" style="margin-top: 1px;">Register Here</a>
        </p>
    </div>
</body>

</html>
